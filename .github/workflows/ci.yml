name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Development Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-declarative-dev libxml2-utils zip

      - name: Run Code Linters
        run: |
          chmod +x dev/lint.sh
          ./dev/lint.sh

      - name: Create and Verify Package
        run: |
          cd package
          zip -r ../gptwidget.plasmoid .
          cd ..
          if [ ! -f gptwidget.plasmoid ]; then
            echo "Error: Plasmoid package creation failed!"
            exit 1
          fi
          echo "Plasmoid package built and verified successfully."

